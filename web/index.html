<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lys over Norge</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      background: #e9eef2;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .time-panel {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 1000;
      width: min(720px, calc(100vw - 24px));
      background: rgba(250, 248, 243, 0.94);
      border: 1px solid rgba(17, 24, 39, 0.14);
      border-radius: 16px;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.18);
      backdrop-filter: blur(10px);
      padding: 12px 14px 10px;
    }

    .time-panel-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }

    .time-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #101828;
    }

    .time-value {
      font-size: 15px;
      color: #243041;
      font-weight: 600;
      white-space: nowrap;
    }

    .time-range {
      width: 100%;
      accent-color: #111827;
    }

    .time-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 12px;
      color: #4b5563;
    }

    .legend {
      background: rgba(250, 248, 243, 0.94);
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.4;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
      border: 1px solid rgba(17, 24, 39, 0.12);
    }

    .legend .title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .legend .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      font-size: 13px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      display: inline-block;
      border: 1px solid rgba(17, 24, 39, 0.7);
      flex: 0 0 14px;
    }

    .label-tooltip {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #10233b;
      font-size: 12px;
      font-weight: 600;
      text-shadow:
        -1px -1px 0 rgba(255, 255, 255, 0.95),
        1px -1px 0 rgba(255, 255, 255, 0.95),
        -1px 1px 0 rgba(255, 255, 255, 0.95),
        1px 1px 0 rgba(255, 255, 255, 0.95);
    }

    .leaflet-popup-content {
      min-width: 220px;
      line-height: 1.4;
    }

    .popup-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .popup-sub {
      color: #444;
      font-size: 13px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="time-panel">
    <div class="time-panel-top">
      <div class="time-title">Lys Over Norge</div>
      <div class="time-value" id="time-value"></div>
    </div>
    <input class="time-range" id="time-range" type="range" min="4" max="23" step="1">
    <div class="time-scale">
      <span>04:00</span>
      <span>23:00</span>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
